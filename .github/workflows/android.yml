name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Gradle Wrapper එක නැති නිසා අලුතින්ම Gradle පරිසරය සකසනවා
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create local and secrets configuration
      run: |
        # project එක තියෙන තැන local.properties සහ .env හදනවා
        PROJECT_ROOT=$(find . -name "build.gradle.kts" -exec dirname {} \; | head -n 1)
        cd $PROJECT_ROOT
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        touch .env
        echo "GEMINI_API_KEY=mock_key_for_building_only" > .env
        
        # බිල්ඩ් එක කෙලින්ම ගෝලීය gradle විධානයෙන් දුවනවා (gradlew නැති නිසා)
        gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"

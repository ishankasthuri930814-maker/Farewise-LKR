name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find and Run Gradle Build
      run: |
        # gradlew ෆයිල් එක තියෙන තැන හොයාගෙන ඒ ෆෝල්ඩරය ඇතුළට යනවා
        GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \;)
        echo "Gradle found in: $GRADLE_DIR"
        cd $GRADLE_DIR
        
        # රහස්‍ය ෆයිල් ටික කෘත්‍රිමව හදනවා
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        touch .env
        echo "GEMINI_API_KEY=mock_key_for_building_only" > .env
        cp .env app/.env || true
        
        # පර්මිෂන් දීලා බිල්ඩ් එක රන් කරනවා
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
